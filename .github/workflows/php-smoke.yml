name: PHP Smoke

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Lint PHP files
        run: |
          git ls-files '*.php' | xargs -n 1 php -l

      - name: Run security contract smoke tests
        run: php tests/smoke/security-contracts.php
